</g> <!-- Connecting arrows --> <g> <line class="arrow" x1="360" y1="110" x2="480" y2="110"/> <line class="arrow" x1="360" y1="200" x2="480" y2="200"/> <text class="label" x="373" y="100">Analogy</text> <text class="label" x="368" y="215">Energy ↔ Probability</text> </g> </svg>