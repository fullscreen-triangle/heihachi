<?xml version="1.0" encoding="UTF-8"?> <svg width="920" height="280" viewBox="0 0 920 280" xmlns="http://www.w3.org/2000/svg"> <style> .box{fill:#f7f9fc;stroke:#2a6fdb;stroke-width:1.5} .arrow{stroke:#444;stroke-width:1.2;marker-end:url(#a)} .title{font: 16px sans-serif; font-weight:600} .txt{font: 12px sans-serif} .code{font: 12px monospace} </style> <defs> <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"> <path d="M0,0 L10,5 L0,10 z" fill="#444"/> </marker> </defs>
    <text class="title" x="250" y="24">Framework: Audio → STFT → Energy → Normalisation → ρ(f,t)</text>
    
    <rect class="box" x="20" y="60" width="160" height="80" rx="6"/> <text class="txt" x="40" y="90">Audio signal x(t)</text> <text class="code" x="40" y="112">t ∈ ℝ, x: ℝ→ℝ</text> <line class="arrow" x1="180" y1="100" x2="230" y2="100"/> <rect class="box" x="230" y="60" width="180" height="80" rx="6"/> <text class="txt" x="250" y="88">Time-Frequency Transform</text> <text class="code" x="250" y="110">X(f,t) = STFT[x(t)]</text> <line class="arrow" x1="410" y1="100" x2="460" y2="100"/> <rect class="box" x="460" y="60" width="170" height="80" rx="6"/> <text class="txt" x="480" y="88">Energy Density</text> <text class="code" x="480" y="110">E(f,t)=|X(f,t)|²</text> <line class="arrow" x1="630" y1="100" x2="680" y2="100"/> <rect class="box" x="680" y="60" width="210" height="80" rx="6"/> <text class="txt" x="700" y="84">Normalised Molecular Density</text> <text class="code" x="700" y="106">ρ(f,t)=E(f,t)/Σ_{f,t}E(f,t)</text> <!-- entropy side box --> <rect class="box" x="460" y="170" width="430" height="80" rx="6"/> <text class="txt" x="480" y="196">Entropy and Energy</text> <text class="code" x="480" y="218">S = - Σ ρ(f,t) log₂ ρ(f,t)</text> <text class="code" x="480" y="236">E_total = Σ ρ(f,t) ε(f,t)</text> <line class="arrow" x1="765" y1="140" x2="765" y2="170"/> </svg>