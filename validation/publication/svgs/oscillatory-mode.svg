<?xml version="1.0" encoding="UTF-8"?> <svg width="860" height="320" viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg"> <style> .panel{fill:#f7f9fc;stroke:#555;stroke-width:1.2;rx:10} .title{font:16px sans-serif;font-weight:700} .lbl{font:12px sans-serif} .stem{stroke:#2a6fdb;stroke-width:3} .arrow{stroke:#444;stroke-width:1.2;marker-end:url(#a)} .curve{fill:none;stroke:#e67e22;stroke-width:2} </style> <defs> <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"> <path d="M0,0 L10,5 L0,10 z" fill="#444"/> </marker> </defs>
    <text class="title" x="250" y="24">Oscillatory Modes → Occupation → Entropy</text>
    
    <rect class="panel" x="40" y="60" width="240" height="200"/> <text class="lbl" x="60" y="80">Mode spectrum (discrete)</text> <g transform="translate(60,180)"> <line x1="0" y1="60" x2="200" y2="60" stroke="#333"/> <line class="stem" x1="10" y1="60" x2="10" y2="10"/> <line class="stem" x1="40" y1="60" x2="40" y2="25"/> <line class="stem" x1="70" y1="60" x2="70" y2="35"/> <line class="stem" x1="100" y1="60" x2="100" y2="20"/> <line class="stem" x1="130" y1="60" x2="130" y2="45"/> <line class="stem" x1="160" y1="60" x2="160" y2="30"/> <line class="stem" x1="190" y1="60" x2="190" y2="50"/> <text class="lbl" x="60" y="80">ω</text> </g> <line class="arrow" x1="280" y1="160" x2="340" y2="160"/> <rect class="panel" x="340" y="60" width="220" height="200"/> <text class="lbl" x="360" y="80">Occupation numbers ⟨n_k⟩</text> <g transform="translate(360,180)"> <line x1="0" y1="60" x2="180" y2="60" stroke="#333"/> <rect x="10" y="20" width="15" height="40" fill="#2a6fdb"/> <rect x="40" y="35" width="15" height="25" fill="#2a6fdb"/> <rect x="70" y="45" width="15" height="15" fill="#2a6fdb"/> <rect x="100" y="28" width="15" height="32" fill="#2a6fdb"/> <rect x="130" y="10" width="15" height="50" fill="#2a6fdb"/> <rect x="160" y="40" width="15" height="20" fill="#2a6fdb"/> <text class="lbl" x="70" y="80">k</text> </g> <line class="arrow" x1="560" y1="160" x2="620" y2="160"/> <rect class="panel" x="620" y="60" width="200" height="200"/> <text class="lbl" x="640" y="80">Entropy S</text> <g transform="translate(640,180)"> <line x1="0" y1="60" x2="160" y2="60" stroke="#333"/> <line x1="0" y1="60" x2="0" y2="0" stroke="#333"/> <path class="curve" d="M0,10 C 40,25 80,40 160,50"/> <text class="lbl" x="-12" y="-6" transform="rotate(-90 -12,-6)">S</text> <text class="lbl" x="70" y="80">⟨n_k⟩</text> </g> </svg>