<?xml version="1.0" encoding="UTF-8"?> <svg width="860" height="320" viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg"> <style> .axis{stroke:#333} .tick{stroke:#888} .bar{fill:#2a6fdb;opacity:0.8} .lbl{font:12px sans-serif} .title{font:16px sans-serif;font-weight:700} </style> <text class="title" x="240" y="24">Eight-Scale Hierarchical Log Frequency Diagram</text> <g transform="translate(60,50)"> <line class="axis" x1="0" y1="240" x2="740" y2="240"/> <text class="lbl" x="320" y="265">log Frequency (Hz)</text> <!-- Bars --> <g class="lbl"> <rect class="bar" x="10" y="20" width="120" height="18"/><text x="140" y="34">Quantum Acoustic (10¹²–10¹⁵)</text> <rect class="bar" x="60" y="50" width="110" height="18"/><text x="180" y="64">Molecular Sound (10⁶–10⁹)</text> <rect class="bar" x="180" y="80" width="160" height="18"/><text x="350" y="94">Electronic (10¹–10⁴)</text> <rect class="bar" x="350" y="110" width="120" height="18"/><text x="480" y="124">Rhythmic (10⁻¹–10¹)</text> <rect class="bar" x="470" y="140" width="100" height="18"/><text x="580" y="154">Phrase (10⁻²–10⁻¹)</text> <rect class="bar" x="560" y="170" width="90" height="18"/><text x="660" y="184">Track (10⁻³–10⁻²)</text> <rect class="bar" x="630" y="200" width="80" height="18"/><text x="720" y="214">Album (10⁻⁴–10⁻³)</text> <rect class="bar" x="680" y="230" width="70" height="18"/><text x="760" y="244">Culture (10⁻⁶–10⁻⁴)</text> </g> </g> </svg>