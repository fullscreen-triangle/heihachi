<?xml version="1.0" encoding="UTF-8"?> <svg width="880" height="360" viewBox="0 0 880 360" xmlns="http://www.w3.org/2000/svg"> <style> .hdr{font: 16px sans-serif; font-weight:700} .cap{font: 12px sans-serif} .panel{fill:#f8f9fb;stroke:#555;stroke-width:1.2;rx:10} .arrow{stroke:#777;stroke-width:1.2;marker-end:url(#ar)} .pill{fill:#eef5ff;stroke:#2a6fdb;stroke-width:1.2;rx:8} .lbl{font: 12px sans-serif} </style> <defs> <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"> <path d="M0,0 L10,5 L0,10 z" fill="#777"/> </marker> </defs>
    <text class="hdr" x="220" y="24">System Overview: Entropy Coordinates, Multi-Scale Oscillations, Equilibrium Restoration</text>
    
    <!-- Three components --> <rect class="panel" x="30" y="60" width="240" height="240"/> <text class="hdr" x="50" y="88">1) Entropy-Based Coordinates</text> <g class="cap" transform="translate(50,110)"> <text y="0">- Construct S-entropy axes for navigation</text> <text y="20">- Frequency/Time/Amplitude semantic mapping</text> <text y="40">- Probability-conserving transforms</text> </g> <rect class="pill" x="50" y="170" width="200" height="40"/> <text class="lbl" x="70" y="195">Coordinate: P = Σ α_i φ(a_i)</text> <rect class="panel" x="320" y="60" width="240" height="240"/> <text class="hdr" x="340" y="88">2) Multi-Scale Oscillations</text> <g class="cap" transform="translate(340,110)"> <text y="0">- Eight-scale hierarchy</text> <text y="20">- Cross-scale coupling corrections</text> <text y="40">- Logarithmic weighting</text> </g> <!-- simple log ladder --> <g transform="translate(340,170)"> <rect x="0" y="0" width="18" height="18" fill="#8bd"/> <rect x="26" y="-6" width="18" height="30" fill="#6ac"/> <rect x="52" y="-12" width="18" height="42" fill="#49a"/> <rect x="78" y="-18" width="18" height="54" fill="#2a8"/> <rect x="104" y="-24" width="18" height="66" fill="#187"/> <rect x="130" y="-30" width="18" height="78" fill="#066"/> </g> <rect class="panel" x="610" y="60" width="240" height="240"/> <text class="hdr" x="630" y="88">3) Equilibrium Restoration</text> <g class="cap" transform="translate(630,110)"> <text y="0">- Exponential relaxation to baseline</text> <text y="20">- Energy-entropy coupled dynamics</text> <text y="40">- Minimum-variance synthesis</text> </g> <!-- exponential curve --> <g transform="translate(630,180)"> <line x1="0" y1="80" x2="180" y2="80" stroke="#333"/> <line x1="0" y1="80" x2="0" y2="0" stroke="#333"/> <path d="M0,10 C 30,15 60,30 90,50 C 120,65 150,75 180,80" fill="none" stroke="#e67e22" stroke-width="2"/> <text class="cap" x="60" y="-10">E(t) → E0 + (E1−E0)e^{-t/τ}</text> </g> <!-- arrows --> <line class="arrow" x1="270" y1="180" x2="320" y2="180"/> <line class="arrow" x1="560" y1="180" x2="610" y2="180"/> </svg>