<?xml version="1.0" encoding="UTF-8"?> <svg width="780" height="280" viewBox="0 0 780 280" xmlns="http://www.w3.org/2000/svg"> <style> .axis{stroke:#333} .grid{stroke:#ccc;stroke-dasharray:3 3} .curve{fill:none;stroke:#e67e22;stroke-width:2} .lbl{font:12px sans-serif} .title{font:16px sans-serif;font-weight:700} .line{stroke:#2a6fdb;stroke-width:1.2;stroke-dasharray:4 4} </style> <text class="title" x="200" y="22">Exponential Restoration to Equilibrium</text> <g transform="translate(60,40)"> <line class="axis" x1="0" y1="200" x2="660" y2="200"/> <line class="axis" x1="0" y1="200" x2="0" y2="0"/> <text class="lbl" x="320" y="225">t</text> <text class="lbl" x="-14" y="-10" transform="rotate(-90 -14,-10)">E(t)</text> <!-- grid --> <g> <line class="grid" x1="0" y1="160" x2="660" y2="160"/> <line class="grid" x1="0" y1="120" x2="660" y2="120"/> <line class="grid" x1="0" y1="80" x2="660" y2="80"/> <line class="grid" x1="0" y1="40" x2="660" y2="40"/> </g> <!-- equilibrium line --> <line class="line" x1="0" y1="60" x2="660" y2="60"/> <text class="lbl" x="10" y="54">E0 (equilibrium)</text> <!-- curve --> <path class="curve" d="M0,20 C 60,40 120,70 180,95 C 240,115 300,130 360,145 C 420,155 480,162 540,167 C 600,170 630,172 660,173"/> <text class="lbl" x="420" y="155">E(t)=E0+(E1−E0)e^{-t/τ}</text> </g> </svg>